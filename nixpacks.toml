# Nixpacks configuration for Railway deployment

[phases.setup]
nixPkgs = ["ffmpeg"]

[phases.install]
cmds = [
    "pip install fastapi 'uvicorn[standard]' gallery-dl httpx imagehash pillow boto3 python-multipart",
]

[start]
cmd = "rm -f /data/library/archive.sqlite && rm -rf /data/library/*/ && PYTHONPATH=/app/src uvicorn xlikes_viewer.server:app --host 0.0.0.0 --port $PORT"
