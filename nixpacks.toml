# Nixpacks configuration for Railway deployment.
#
# Railway の Root Directory は projects/archive（このファイルがある場所）に設定すること。
# start コマンドは src/ を PYTHONPATH に載せて xlikes_viewer を import する。
#
# install の依存リストは pyproject.toml の [project] dependencies と一致させること。
# （ズレると本番だけ ModuleNotFoundError になる。例: beautifulsoup4 欠落で
#  HTML スクレイピング import が壊れた 2026-06-04 の事象）

[phases.setup]
nixPkgs = ["ffmpeg"]

[phases.install]
cmds = [
    "pip install fastapi 'uvicorn[standard]' gallery-dl httpx imagehash pillow boto3 python-multipart beautifulsoup4 requests",
]

[start]
cmd = "PYTHONPATH=/app/src uvicorn xlikes_viewer.server:app --host 0.0.0.0 --port $PORT"
