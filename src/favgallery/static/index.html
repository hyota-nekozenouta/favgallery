<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FavGallery</title>
  <link rel="stylesheet" href="/static/style.css?v=__ASSET_VERSION__" />
</head>
<body class="min-h-screen">
  <div id="sidebar-overlay"></div>
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside id="app-sidebar" class="w-72 border-r border-zinc-800 flex flex-col">
      <div class="px-4 py-3 border-b border-zinc-800">
        <div class="flex items-center gap-2">
          <div class="wordmark">FavGallery</div>
          <span class="text-xs text-zinc-500 font-display" id="postCount"></span>
          <div class="flex-1"></div>
          <span id="loadingIndicator" class="hidden text-base leading-none select-none">⏳</span>
          <button id="manualSyncBtn" class="text-zinc-500 hover:text-zinc-200 text-base p-1 rounded hover:bg-zinc-800" title="今すぐ同期">⟳</button>
          <button id="optionsBtn" class="text-zinc-500 hover:text-zinc-200 text-base p-1 rounded hover:bg-zinc-800" title="設定">⚙</button>
        </div>
        <div id="sidebarPostsHeader">
          <input id="searchBox" type="search" placeholder="検索 (作者・本文・タグ)"
                 class="mt-3 w-full bg-zinc-900 border border-zinc-800 rounded-md px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" />

          <div class="mt-3 grid grid-cols-3 gap-1 text-xs">
            <button data-mt="" class="mt-btn chip rounded px-2 py-1 active">All</button>
            <button data-mt="photo" class="mt-btn chip rounded px-2 py-1">Photo</button>
            <button data-mt="video" class="mt-btn chip rounded px-2 py-1">Video</button>
          </div>
        </div>

      </div>

      <div id="sidebarPosts" class="flex-1 overflow-y-auto scroll-thin">
        <!-- Lists -->
        <div class="px-4 py-3 border-b border-zinc-800">
          <div class="flex items-center justify-between mb-2">
            <div class="text-xs uppercase tracking-wider text-zinc-500">📋 リスト</div>
            <button id="newListBtn" class="text-xs text-indigo-400 hover:text-indigo-300">+ 新規</button>
          </div>
          <div id="listSidebar" class="space-y-1"></div>
        </div>
        <!-- Authors -->
        <div class="px-4 py-3">
          <div class="flex items-center justify-between mb-2">
            <div class="text-xs uppercase tracking-wider text-zinc-500">作者</div>
            <div id="authorTotal" class="text-xs text-zinc-500"></div>
          </div>
          <div id="authorList" class="space-y-1"></div>
          <div id="authorSingleSection" class="hidden mt-1">
            <button id="authorSingleToggle" class="w-full flex items-center justify-between text-xs text-zinc-600 hover:text-zinc-400 py-1">
              1件のみ <span id="authorSingleIcon">▶</span>
            </button>
            <div id="authorSingleList" class="space-y-1 hidden"></div>
          </div>
        </div>
        <!-- Tags -->
        <div class="px-4 py-3 border-t border-zinc-800">
          <button id="tagToggle" class="w-full flex items-center justify-between text-xs uppercase tracking-wider text-zinc-500 hover:text-zinc-300">
            タグ <span id="tagToggleIcon">▶</span>
          </button>
          <div id="tagList" class="flex flex-wrap gap-1 mt-2 hidden"></div>
        </div>
      </div>

      <!-- Bookshelf Sidebar (hidden by default) -->
      <div id="sidebarBooks" class="flex-1 overflow-y-auto scroll-thin hidden">
        <div class="px-4 py-3 border-b border-zinc-800">
          <button id="sidebarAddBookBtn" class="w-full px-3 py-2 rounded-md text-sm bg-indigo-600 hover:bg-indigo-500 text-white font-medium">+ 漫画を追加</button>
        </div>
        <!-- Favorites filter -->
        <div class="px-4 py-3 border-b border-zinc-800">
          <button id="bookFavFilter" class="w-full flex items-center gap-2 text-sm text-zinc-300 hover:text-white py-1 px-2 rounded hover:bg-zinc-800 transition-colors">
            <span>⭐</span> <span>お気に入り</span> <span id="bookFavCount" class="ml-auto text-xs text-zinc-500">0</span>
          </button>
        </div>
        <!-- Book Tags -->
        <div class="px-4 py-3">
          <div class="flex items-center justify-between mb-2">
            <div class="text-xs uppercase tracking-wider text-zinc-500">🏷 タグ</div>
          </div>
          <div id="bookTagList" class="space-y-1"></div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col overflow-hidden">
      <div class="px-6 py-3 border-b border-zinc-800 flex items-center gap-3">
        <button id="hamburger-btn"
          class="items-center justify-center w-8 h-8 text-zinc-400 hover:text-white hover:bg-zinc-700 rounded transition-colors text-xl leading-none"
          title="メニュー">☰</button>
        <div class="flex items-center gap-1 bg-zinc-900 rounded-md p-1">
          <button id="tabLikes" class="tab-btn active"><span class="tab-icon">♥</span><span class="tab-label">いいね</span></button>
          <button id="tabTimeline" class="tab-btn"><span class="tab-icon">👁</span><span class="tab-label">フォロー中</span></button>
          <button id="tabBookshelf" class="tab-btn"><span class="tab-icon">📚</span><span class="tab-label">本棚</span></button>
        </div>
        <button id="layoutToggle" title="レイアウト切替"
          class="p-1.5 rounded text-zinc-400 hover:text-white hover:bg-zinc-700 transition-colors text-lg leading-none">▦</button>
        <div id="filterChips" class="flex flex-wrap gap-2"></div>
        <div class="flex-1"></div>
        <button id="markSeenBtn" class="hidden bg-zinc-800 hover:bg-zinc-700 text-zinc-200 text-xs rounded-md px-3 py-1.5" title="現在いちばん上のツイートまで「ここまで見た」マークを移動">📍 ここまで既読</button>
<button id="timelineRefreshBtn" class="hidden bg-indigo-600 hover:bg-indigo-500 text-white text-xs rounded-md px-3 py-1.5">⟳ 取得</button>
        <div class="text-sm text-zinc-500 font-display" id="resultCount"></div>
      </div>
      <div id="authorHeader" class="hidden px-6 py-2 border-b border-zinc-800 flex items-center gap-3 bg-zinc-950/60">
        <div class="flex items-baseline gap-2">
          <div id="authorHeaderName" class="text-base font-semibold"></div>
          <div id="authorHeaderHandle" class="text-xs text-zinc-500"></div>
        </div>
        <div class="flex-1"></div>
        <div id="authorMediaTabs" class="flex items-center gap-1 bg-zinc-900 rounded-md p-1 text-xs"></div>
      </div>
      <div id="grid" class="flex-1 overflow-y-auto scroll-thin px-6 py-4">
        <div class="masonry" id="masonry"></div>
        <div id="sentinel" class="h-16"></div>
      </div>
    </main>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="modal fixed inset-0 bg-black/85 hidden items-center justify-center z-50">
    <div class="absolute top-4 right-6 text-zinc-400 hover:text-white text-3xl cursor-pointer select-none" id="lbClose">×</div>
    <div id="lbPrev" class="lb-nav-btn lb-prev hidden" title="前の画像 (←)">◀</div>
    <div id="lbNext" class="lb-nav-btn lb-next hidden" title="次の画像 (→)">▶</div>
    <div class="max-w-[92vw] max-h-[92vh] w-full flex flex-col items-center gap-3">
      <div id="lbMedia" class="max-h-[80vh] flex items-center justify-center"></div>
      <div class="bg-zinc-900/80 rounded-lg p-4 max-w-3xl w-full text-sm" id="lbMeta"></div>
    </div>
  </div>

  <!-- Book Reader Modal -->
  <div id="readerModal" class="fixed inset-0 bg-black hidden items-center justify-center z-[60] select-none overflow-hidden">
    <div id="readerCloseBtn" class="absolute top-4 right-6 text-zinc-400 hover:text-white text-3xl cursor-pointer z-20">×</div>
    <div class="absolute top-4 left-1/2 -translate-x-1/2 text-zinc-400 text-sm z-20" id="readerPageNum">1 / 1</div>
    <!-- 3-pane slide track. RTL (manga) layout left->right = [next, current, prev]. -->
    <div id="readerViewport" class="absolute inset-0 overflow-hidden touch-none">
      <div id="readerTrack" class="absolute inset-0 flex" style="will-change:transform">
        <div class="reader-pane shrink-0 w-screen h-full flex items-center justify-center"><img data-slot="0" alt="" class="max-w-full max-h-full object-contain" /></div>
        <div class="reader-pane shrink-0 w-screen h-full flex items-center justify-center"><img data-slot="1" alt="" class="max-w-full max-h-full object-contain" /></div>
        <div class="reader-pane shrink-0 w-screen h-full flex items-center justify-center"><img data-slot="2" alt="" class="max-w-full max-h-full object-contain" /></div>
      </div>
    </div>
  </div>

  <!-- List popover (single shared instance) -->
  <div id="listPopover" class="popover hidden"></div>

  <!-- Options popover -->
  <div id="optionsPopover" class="popover hidden" style="top:0;left:0">
    <div class="px-1 pb-2 text-xs text-zinc-500 uppercase tracking-wider border-b border-zinc-800 mb-2">マイいいね設定</div>
    <div class="space-y-2">
      <div class="flex items-center gap-1">
        <span class="text-zinc-500 text-xs">@</span>
        <input id="meUsername" type="text" placeholder="あなたのXハンドル"
               class="flex-1 bg-zinc-900 border border-zinc-800 rounded px-2 py-1 text-xs focus:outline-none focus:border-indigo-500" />
        <button id="meSaveBtn" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-200 rounded px-2 py-1 text-xs">保存</button>
      </div>
      <button id="meSyncBtn" class="w-full bg-rose-700 hover:bg-rose-600 text-white rounded px-2 py-1 text-xs">♥ マイいいね同期</button>
      <div id="meStatus" class="text-zinc-500 text-xs"></div>
    </div>
    <div class="px-1 pt-2 pb-1 mt-2 text-xs text-zinc-500 uppercase tracking-wider border-t border-zinc-800">X cookies</div>
    <div class="space-y-1">
      <div id="cookieStatus" class="text-zinc-500 text-xs">確認中…</div>
      <button id="cookieSetBtn" class="w-full bg-zinc-800 hover:bg-zinc-700 text-zinc-200 rounded px-2 py-1 text-xs">🔑 cookies を設定 / 更新</button>
    </div>
    <div class="px-1 pt-2 mt-2 text-[10px] text-zinc-600 border-t border-zinc-800">FavGallery v__APP_VERSION__</div>
  </div>

<script>
// __APP_VERSION__ はサーバー (server.py root()) が配信時に実バージョンへ置換する。
// 端末側に「どの版が表示されているか」を出すため (2026-06-10 スマホキャッシュ診断)。
window.APP_VERSION = '__APP_VERSION__';

// 遠隔診断: 端末で起きた JS エラーをサーバーログへ送る。スマホなど DevTools を
// 開けない環境の「押しても何も起きない」を Railway ログから特定する (2026-06-10)。
function reportClientError(kind, message) {
  try {
    fetch('/api/client-log', {
      method: 'POST', keepalive: true,
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        v: window.APP_VERSION,
        ua: navigator.userAgent.slice(0, 120),
        kind,
        message: String(message).slice(0, 500),
      }),
    });
  } catch { /* 診断経路自体では落とさない */ }
}
window.addEventListener('error', (e) =>
  reportClientError('error', `${e.message} @${e.filename || ''}:${e.lineno || 0}`));
window.addEventListener('unhandledrejection', (e) =>
  reportClientError('unhandledrejection',
    (e.reason && (e.reason.stack || e.reason.message)) || e.reason));
</script>
<!-- import map: 全モジュールを ?v=__ASSET_VERSION__ 付き URL へ解決 (Phase 4B)。
     Cloudflare が /static/*.js を 4h 強制キャッシュするため、深い相対 import では
     ?v= を運べない → ここで bare specifier をバージョン付き URL にマップする。
     __ASSET_VERSION__ は server root() が配信時に資産ハッシュへ置換 (index.html 内のみ置換が効く)。 -->
<script type="importmap">
{
  "imports": {
    "state": "/static/lib/state.js?v=__ASSET_VERSION__",
    "dom": "/static/lib/dom.js?v=__ASSET_VERSION__",
    "notices": "/static/lib/notices.js?v=__ASSET_VERSION__",
    "cookies": "/static/lib/cookies.js?v=__ASSET_VERSION__",
    "reader": "/static/lib/reader.js?v=__ASSET_VERSION__",
    "bookshelf": "/static/lib/bookshelf.js?v=__ASSET_VERSION__",
    "library": "/static/lib/library.js?v=__ASSET_VERSION__",
    "posts": "/static/lib/posts.js?v=__ASSET_VERSION__",
    "lightbox": "/static/lib/lightbox.js?v=__ASSET_VERSION__",
    "popovers": "/static/lib/popovers.js?v=__ASSET_VERSION__",
    "timeline": "/static/lib/timeline.js?v=__ASSET_VERSION__",
    "sync": "/static/lib/sync.js?v=__ASSET_VERSION__",
    "mylikes": "/static/lib/mylikes.js?v=__ASSET_VERSION__"
  }
}
</script>
<script type="module" src="/static/lib/main.js?v=__ASSET_VERSION__"></script>
</body>
</html>
